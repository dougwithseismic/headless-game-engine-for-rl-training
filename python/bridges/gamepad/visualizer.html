<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostLobby Gamepad</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { mono: ['"JetBrains Mono"','"SF Mono"','"Fira Code"','monospace'] } } }
}
</script>
<style>
  body { overflow: hidden; }
  .feed-scroll::-webkit-scrollbar { width: 3px; }
  .feed-scroll::-webkit-scrollbar-track { background: transparent; }
  .feed-scroll::-webkit-scrollbar-thumb { background: rgb(51 65 85); border-radius: 2px; }

  /* SVG interactive highlights */
  .controller-svg { touch-action: none; }
  .controller-svg [data-part="btn-a"].active path,
  .controller-svg [data-part="btn-a"].active ellipse,
  .controller-svg [data-part="btn-a"].active circle { fill: #34d399 !important; filter: drop-shadow(0 0 8px #34d399); }
  .controller-svg [data-part="btn-b"].active path,
  .controller-svg [data-part="btn-b"].active ellipse,
  .controller-svg [data-part="btn-b"].active circle { fill: #f87171 !important; filter: drop-shadow(0 0 8px #f87171); }
  .controller-svg [data-part="btn-x"].active path,
  .controller-svg [data-part="btn-x"].active ellipse,
  .controller-svg [data-part="btn-x"].active circle { fill: #3b82f6 !important; filter: drop-shadow(0 0 8px #3b82f6); }
  .controller-svg [data-part="btn-y"].active path,
  .controller-svg [data-part="btn-y"].active ellipse,
  .controller-svg [data-part="btn-y"].active circle { fill: #fbbf24 !important; filter: drop-shadow(0 0 8px #fbbf24); }
  .controller-svg [data-part="btn-back"].active path,
  .controller-svg [data-part="btn-back"].active circle,
  .controller-svg [data-part="btn-start"].active path,
  .controller-svg [data-part="btn-start"].active circle { fill: #94a3b8 !important; filter: drop-shadow(0 0 6px #94a3b8); }
  .controller-svg [data-part="btn-guide"].active path,
  .controller-svg [data-part="btn-guide"].active circle,
  .controller-svg [data-part="btn-guide"].active ellipse { fill: #ffffff !important; filter: drop-shadow(0 0 10px #ffffff); }
  .controller-svg [data-part="bumpers"].lb-active path { clip-path: inset(0 50% 0 0); fill: #60a5fa !important; filter: drop-shadow(0 0 6px #60a5fa); }
  .controller-svg [data-part="bumpers"].rb-active path { clip-path: inset(0 0 0 50%); fill: #60a5fa !important; filter: drop-shadow(0 0 6px #60a5fa); }
  .controller-svg [data-part="bumpers"].both-active path { fill: #60a5fa !important; filter: drop-shadow(0 0 6px #60a5fa); }
  .controller-svg [data-part="trigger-left"].active path,
  .controller-svg [data-part="trigger-right"].active path { fill: #60a5fa !important; filter: drop-shadow(0 0 6px #60a5fa); }
  .controller-svg [data-part="dpad"].active path,
  .controller-svg [data-part="dpad-front"].active path { fill: #60a5fa !important; filter: drop-shadow(0 0 6px #60a5fa); }

  /* Stick active glow only — movement handled by JS preserving original transform */

  /* Stick active glow */
  .controller-svg [data-part="stick-left"].active ellipse,
  .controller-svg [data-part="stick-right"].active ellipse { filter: drop-shadow(0 0 8px #22d3ee); }
</style>
</head>
<body class="bg-slate-950 text-slate-100 font-mono text-xs h-screen flex flex-col select-none">

<!-- Header -->
<header class="flex items-center justify-between px-4 py-2.5 bg-slate-900 border-b border-slate-800 shrink-0">
  <div class="flex items-center gap-3">
    <span class="text-[13px] font-bold tracking-widest uppercase text-slate-500">Ghost<span class="text-blue-400">Lobby</span> Gamepad</span>
    <span id="status-badge" class="text-[10px] font-semibold px-2 py-0.5 rounded bg-red-500/10 text-red-400">disconnected</span>
    <span id="input-badge" class="text-[10px] font-semibold px-2 py-0.5 rounded bg-slate-800 text-slate-500 hidden">USER INPUT</span>
  </div>
  <div class="flex items-center gap-5 text-slate-500 text-[11px] tabular-nums">
    <span id="tick-display">tick 0</span>
    <span id="fps-display">0 fps</span>
  </div>
</header>

<!-- Main -->
<div class="flex-1 grid grid-cols-[1fr_340px] overflow-hidden">

  <!-- Left: Controller + bars + modes -->
  <div class="flex flex-col overflow-hidden">
    <!-- SVG controller -->
    <div class="flex-1 flex items-center justify-center p-4 min-h-0 relative">
      <div id="controller-wrap" class="controller-svg relative cursor-pointer" style="max-width:700px;width:100%;">
        <!-- SVG loaded here -->
      </div>
      <!-- Overlay canvas for stick/trigger interaction zones (invisible) -->
      <canvas id="hit-canvas" class="absolute inset-0 w-full h-full pointer-events-none opacity-0"></canvas>
    </div>

    <!-- Axis bars -->
    <div id="axis-bars" class="grid grid-cols-6 gap-1.5 px-4 pb-2 shrink-0"></div>

    <!-- Mode buttons -->
    <div id="modes" class="flex flex-wrap gap-1 px-4 pb-3 shrink-0"></div>
  </div>

  <!-- Right: telemetry panel -->
  <div class="flex flex-col border-l border-slate-800 bg-slate-900 overflow-hidden">
    <div class="px-3 py-2 text-[10px] font-semibold uppercase tracking-wider text-slate-500 border-b border-slate-800">Buttons</div>
    <div id="button-grid" class="grid grid-cols-7 gap-1 px-3 py-2 border-b border-slate-800 shrink-0"></div>

    <div class="px-3 py-2 text-[10px] font-semibold uppercase tracking-wider text-slate-500 border-b border-slate-800">PID Targets</div>
    <div id="pid-panel" class="px-3 py-2 border-b border-slate-800 shrink-0 space-y-1"></div>

    <div class="px-3 py-2 text-[10px] font-semibold uppercase tracking-wider text-slate-500 border-b border-slate-800 flex justify-between items-center shrink-0">
      <span>Telemetry Feed</span>
      <button onclick="clearFeed()" class="text-slate-600 hover:text-red-400 transition-colors text-[10px] cursor-pointer">clear</button>
    </div>
    <div id="feed" class="flex-1 overflow-y-auto feed-scroll text-[11px]"></div>
  </div>
</div>

<script>
// --- State ---
let state = {
  axes: {left_stick_x:0,left_stick_y:0,right_stick_x:0,right_stick_y:0,left_trigger:0,right_trigger:0},
  buttons: {}, pid_targets: {}, mode: '', tick: 0,
};
let prevState = JSON.parse(JSON.stringify(state));
const BUTTONS = ['a','b','x','y','lb','rb','start','back','l3','r3','dpad_up','dpad_down','dpad_left','dpad_right'];
BUTTONS.forEach(b => { state.buttons[b]=false; prevState.buttons[b]=false; });
const AXES = ['left_stick_x','left_stick_y','left_trigger','right_stick_x','right_stick_y','right_trigger'];
let feedLines = [], fpsFrames=0, lastFpsTime=performance.now(), currentFps=0;
let dragging = null, heldButtons = new Set();

// --- Load SVG ---
async function loadSVG() {
  const resp = await fetch('/controller.svg');
  const text = await resp.text();
  document.getElementById('controller-wrap').innerHTML = text;
  const svg = document.querySelector('#controller-wrap svg');
  svg.style.width = '100%';
  svg.style.height = 'auto';
  svg.style.maxHeight = '100%';
  setupInteraction();
}

// --- SVG state updates ---

// Cache original transforms so we can append stick offset without overriding
let _origTransforms = {};
function getOrigTransform(el) {
  const key = el.getAttribute('id') || el.dataset.part;
  if (!_origTransforms[key]) {
    _origTransforms[key] = el.getAttribute('transform') || '';
  }
  return _origTransforms[key];
}

function updateSVG() {
  const a = state.axes, b = state.buttons;

  // Sticks — append translate to existing SVG transform attribute
  const stickRange = 25; // SVG coordinate units of travel
  const ls = document.querySelector('[data-part="stick-left"]');
  const rs = document.querySelector('[data-part="stick-right"]');
  if (ls) {
    const lmag = Math.sqrt(a.left_stick_x**2 + a.left_stick_y**2);
    const orig = getOrigTransform(ls);
    ls.setAttribute('transform', `${orig} translate(${a.left_stick_x * stickRange}, ${-a.left_stick_y * stickRange})`);
    ls.classList.toggle('active', lmag > 0.05);
  }
  if (rs) {
    const rmag = Math.sqrt(a.right_stick_x**2 + a.right_stick_y**2);
    const orig = getOrigTransform(rs);
    rs.setAttribute('transform', `${orig} translate(${a.right_stick_x * stickRange}, ${-a.right_stick_y * stickRange})`);
    rs.classList.toggle('active', rmag > 0.05);
  }

  // Face buttons
  for (const [key, part] of Object.entries({a:'btn-a',b:'btn-b',x:'btn-x',y:'btn-y',start:'btn-start',back:'btn-back'})) {
    const el = document.querySelector(`[data-part="${part}"]`);
    if (el) el.classList.toggle('active', !!b[key]);
  }

  // Bumpers — single SVG path, clip to left/right half based on which is pressed
  const bumpEl = document.querySelector('[data-part="bumpers"]');
  if (bumpEl) {
    bumpEl.classList.remove('lb-active', 'rb-active', 'both-active');
    if (b.lb && b.rb) bumpEl.classList.add('both-active');
    else if (b.lb) bumpEl.classList.add('lb-active');
    else if (b.rb) bumpEl.classList.add('rb-active');
  }

  // Triggers
  const ltEl = document.querySelector('[data-part="trigger-left"]');
  const rtEl = document.querySelector('[data-part="trigger-right"]');
  if (ltEl) ltEl.classList.toggle('active', a.left_trigger > 0.1);
  if (rtEl) rtEl.classList.toggle('active', a.right_trigger > 0.1);

  // Dpad + guide
  const dpadActive = b.dpad_up || b.dpad_down || b.dpad_left || b.dpad_right;
  for (const part of ['dpad', 'dpad-front', 'dpad-bottom']) {
    const el = document.querySelector(`[data-part="${part}"]`);
    if (el) el.classList.toggle('active', dpadActive);
  }
  const guideEl = document.querySelector('[data-part="btn-guide"]');
  if (guideEl) guideEl.classList.toggle('active', !!b.guide);
}

// --- Interaction with SVG ---
function setupInteraction() {
  const wrap = document.getElementById('controller-wrap');
  const svg = wrap.querySelector('svg');
  if (!svg) return;

  // Get bounding boxes of interactive elements in SVG coordinates
  function svgPoint(clientX, clientY) {
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  // Hit zones in SVG coordinates (viewBox 0 0 1543 956)
  const zones = {
    leftStick:  { cx: 345, cy: 512, r: 90 },
    rightStick: { cx: 986, cy: 746, r: 90 },
    leftTrigger:  { x: 200, y: 0, w: 250, h: 140 },
    rightTrigger: { x: 1050, y: 0, w: 250, h: 140 },
    lb: { x: 200, y: 140, w: 300, h: 80 },
    rb: { x: 1000, y: 140, w: 300, h: 80 },
    dpad: { cx: 470, cy: 740, r: 80 },
  };

  function dist(ax,ay,bx,by) { return Math.sqrt((ax-bx)**2+(ay-by)**2); }

  function hitTest(sx, sy) {
    if (dist(sx,sy,zones.leftStick.cx,zones.leftStick.cy) < zones.leftStick.r)
      return {type:'stick',id:'left',zone:zones.leftStick};
    if (dist(sx,sy,zones.rightStick.cx,zones.rightStick.cy) < zones.rightStick.r)
      return {type:'stick',id:'right',zone:zones.rightStick};
    const lt=zones.leftTrigger;
    if (sx>=lt.x&&sx<=lt.x+lt.w&&sy>=lt.y&&sy<=lt.y+lt.h) return {type:'trigger',id:'left',zone:lt};
    const rt=zones.rightTrigger;
    if (sx>=rt.x&&sx<=rt.x+rt.w&&sy>=rt.y&&sy<=rt.y+rt.h) return {type:'trigger',id:'right',zone:rt};
    const lbz=zones.lb;
    if (sx>=lbz.x&&sx<=lbz.x+lbz.w&&sy>=lbz.y&&sy<=lbz.y+lbz.h) return {type:'button',id:'lb'};
    const rbz=zones.rb;
    if (sx>=rbz.x&&sx<=rbz.x+rbz.w&&sy>=rbz.y&&sy<=rbz.y+rbz.h) return {type:'button',id:'rb'};
    // Dpad: determine direction based on quadrant from center
    const dp=zones.dpad;
    if (dist(sx,sy,dp.cx,dp.cy) < dp.r) {
      const dx=sx-dp.cx, dy=sy-dp.cy;
      if (Math.abs(dx)>Math.abs(dy)) return {type:'button',id:dx>0?'dpad_right':'dpad_left'};
      else return {type:'button',id:dy>0?'dpad_down':'dpad_up'};
    }
    return null;
  }

  // Use event delegation for button clicks on SVG elements
  wrap.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    wrap.setPointerCapture(e.pointerId);
    const sp = svgPoint(e.clientX, e.clientY);

    // Check SVG element hit first for face buttons (not bumpers/dpad — those use zone detection)
    const target = e.target.closest('[data-part]');
    if (target) {
      const part = target.dataset.part;
      const btnLookup = {'btn-a':'a','btn-b':'b','btn-x':'x','btn-y':'y',
        'btn-start':'start','btn-back':'back','btn-guide':'guide','btn-pair':'pair'};
      if (btnLookup[part]) {
        heldButtons.add(btnLookup[part]);
        sendUserInput({}, {[btnLookup[part]]: true});
        showUserBadge();
        return;
      }
      // For bumpers/dpad, fall through to zone-based hit test below
    }

    // Then check stick/trigger/bumper/dpad zones
    const hit = hitTest(sp.x, sp.y);
    if (!hit) return;

    if (hit.type === 'stick') {
      dragging = hit;
      updateStickFromSVG(sp.x, sp.y, hit);
    } else if (hit.type === 'trigger') {
      dragging = hit;
      updateTriggerFromSVG(sp.y, hit);
    } else if (hit.type === 'button') {
      heldButtons.add(hit.id);
      sendUserInput({}, {[hit.id]: true});
    }
    showUserBadge();
  });

  wrap.addEventListener('pointermove', (e) => {
    if (!dragging) {
      const sp = svgPoint(e.clientX, e.clientY);
      const hit = hitTest(sp.x, sp.y);
      const target = e.target.closest('[data-part]');
      wrap.style.cursor = (hit || target) ? 'grab' : 'default';
      return;
    }
    e.preventDefault();
    const sp = svgPoint(e.clientX, e.clientY);
    if (dragging.type === 'stick') updateStickFromSVG(sp.x, sp.y, dragging);
    else if (dragging.type === 'trigger') updateTriggerFromSVG(sp.y, dragging);
  });

  wrap.addEventListener('pointerup', (e) => {
    if (dragging) {
      if (dragging.type === 'stick') {
        sendUserInput({[dragging.id+'_stick_x']:0,[dragging.id+'_stick_y']:0},{});
      } else if (dragging.type === 'trigger') {
        sendUserInput({[dragging.id+'_trigger']:0},{});
      }
      dragging = null;
    }
    if (heldButtons.size > 0) {
      const release = {};
      heldButtons.forEach(b => release[b] = false);
      sendUserInput({}, release);
      heldButtons.clear();
    }
    wrap.style.cursor = 'default';
  });

  function updateStickFromSVG(sx, sy, hit) {
    const z = hit.zone;
    const dx = (sx - z.cx) / z.r;
    const dy = -(sy - z.cy) / z.r;
    const mag = Math.sqrt(dx*dx + dy*dy);
    let vx = dx, vy = dy;
    if (mag > 1) { vx /= mag; vy /= mag; }
    sendUserInput({[hit.id+'_stick_x']:Math.round(vx*1000)/1000,[hit.id+'_stick_y']:Math.round(vy*1000)/1000},{});
  }

  function updateTriggerFromSVG(sy, hit) {
    const z = hit.zone;
    const val = 1.0 - Math.max(0, Math.min(1, (sy - z.y) / z.h));
    sendUserInput({[hit.id+'_trigger']:Math.round(val*1000)/1000},{});
  }
}

function sendUserInput(axes, buttons) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type:'input',axes,buttons}));
}
function showUserBadge() {
  const b = document.getElementById('input-badge');
  b.classList.remove('hidden'); b.className='text-[10px] font-semibold px-2 py-0.5 rounded bg-cyan-500/15 text-cyan-400';
  clearTimeout(window._ubt); window._ubt=setTimeout(()=>b.classList.add('hidden'),1500);
}

// Keyboard
document.addEventListener('keydown',(e)=>{
  if(e.repeat)return;
  const map={KeyW:{a:'left_stick_y',v:1},KeyS:{a:'left_stick_y',v:-1},KeyA:{a:'left_stick_x',v:-1},KeyD:{a:'left_stick_x',v:1},
    ArrowUp:{a:'right_stick_y',v:1},ArrowDown:{a:'right_stick_y',v:-1},ArrowLeft:{a:'right_stick_x',v:-1},ArrowRight:{a:'right_stick_x',v:1},
    ShiftLeft:{t:'left_trigger',v:1},ShiftRight:{t:'right_trigger',v:1},
    Space:{b:'a'},KeyE:{b:'b'},KeyQ:{b:'x'},KeyR:{b:'y'},Tab:{b:'lb'},Backslash:{b:'rb'}};
  const m=map[e.code]; if(!m)return; e.preventDefault(); showUserBadge();
  if(m.a)sendUserInput({[m.a]:m.v},{}); else if(m.t)sendUserInput({[m.t]:m.v},{}); else if(m.b){heldButtons.add(m.b);sendUserInput({},{[m.b]:true});}
});
document.addEventListener('keyup',(e)=>{
  const map={KeyW:'left_stick_y',KeyS:'left_stick_y',KeyA:'left_stick_x',KeyD:'left_stick_x',
    ArrowUp:'right_stick_y',ArrowDown:'right_stick_y',ArrowLeft:'right_stick_x',ArrowRight:'right_stick_x',
    ShiftLeft:'left_trigger',ShiftRight:'right_trigger',Space:'a',KeyE:'b',KeyQ:'x',KeyR:'y',Tab:'lb',Backslash:'rb'};
  const k=map[e.code]; if(!k)return; e.preventDefault();
  if(['left_stick_x','left_stick_y','right_stick_x','right_stick_y'].includes(k))sendUserInput({[k]:0},{});
  else if(k.includes('trigger'))sendUserInput({[k]:0},{});
  else{heldButtons.delete(k);sendUserInput({},{[k]:false});}
});

// --- DOM panels (same as before) ---
function initAxisBars() {
  const el=document.getElementById('axis-bars');
  const labels={left_stick_x:'L-X',left_stick_y:'L-Y',left_trigger:'LT',right_stick_x:'R-X',right_stick_y:'R-Y',right_trigger:'RT'};
  el.innerHTML=AXES.map(k=>`
    <div class="bg-slate-900 border border-slate-800 rounded-md px-2 py-1.5 text-center">
      <div class="text-[9px] text-slate-500 uppercase tracking-wide">${labels[k]}</div>
      <div class="h-1 bg-slate-800 rounded-full mt-1.5 mb-1 relative overflow-hidden">
        <div class="absolute h-full rounded-full bg-blue-500 transition-all duration-[50ms]" id="abf-${k}"></div>
      </div>
      <div class="text-[12px] font-semibold tabular-nums text-slate-400" id="abv-${k}">+0.0000</div>
    </div>`).join('');
}
function updateAxisBars() {
  for(const k of AXES){
    const v=state.axes[k],fill=document.getElementById('abf-'+k),val=document.getElementById('abv-'+k);
    const isTrig=k.includes('trigger');
    if(isTrig){fill.style.left='0%';fill.style.width=(v*100)+'%';}
    else{const p=(v+1)/2*100;if(v>=0){fill.style.left='50%';fill.style.width=(p-50)+'%';}else{fill.style.left=p+'%';fill.style.width=(50-p)+'%';}}
    val.textContent=v>=0?'+'+v.toFixed(4):v.toFixed(4);
    val.className=Math.abs(v)>0.01?'text-[12px] font-semibold tabular-nums text-blue-400':'text-[12px] font-semibold tabular-nums text-slate-500';
  }
}
function initButtonGrid(){
  document.getElementById('button-grid').innerHTML=BUTTONS.map(b=>
    `<div class="text-center py-1 rounded text-[9px] font-semibold uppercase bg-slate-800 text-slate-600 transition-all duration-75" id="bg-${b}">${b}</div>`
  ).join('');
}
function updateButtonGrid(){
  const cm={a:'bg-emerald-500 text-white',b:'bg-red-400 text-white',x:'bg-blue-500 text-white',y:'bg-yellow-400 text-slate-900'};
  for(const b of BUTTONS){
    const el=document.getElementById('bg-'+b);
    if(state.buttons[b]){const c=cm[b]||'bg-violet-500 text-white';el.className=`text-center py-1 rounded text-[9px] font-semibold uppercase ${c} transition-all duration-75 shadow-lg`;}
    else el.className='text-center py-1 rounded text-[9px] font-semibold uppercase bg-slate-800 text-slate-600 transition-all duration-75';
  }
}
function initPidPanel(){
  document.getElementById('pid-panel').innerHTML=AXES.map(k=>`
    <div class="flex items-center gap-2 text-[11px]">
      <span class="text-slate-500 text-[9px] uppercase w-16 shrink-0 truncate">${k.replace(/_/g,' ')}</span>
      <div class="flex-1 h-1.5 bg-slate-800 rounded-full relative">
        <div class="absolute h-full rounded-full bg-blue-500/60 transition-all duration-[50ms]" id="pidc-${k}"></div>
        <div class="absolute top-[-2px] w-0.5 h-[10px] bg-orange-400 rounded-sm transition-all duration-[50ms]" id="pidt-${k}"></div>
      </div>
      <span class="tabular-nums text-slate-400 w-10 text-right text-[10px]" id="pidv-${k}">0.00</span>
    </div>`).join('');
}
function updatePidPanel(){
  const a=state.axes,t=state.pid_targets;
  for(const k of AXES){
    const cur=a[k]||0,tgt=t[k]||0,isTrig=k.includes('trigger');
    const curEl=document.getElementById('pidc-'+k),tgtEl=document.getElementById('pidt-'+k),valEl=document.getElementById('pidv-'+k);
    if(isTrig){curEl.style.left='0%';curEl.style.width=(Math.abs(cur)*100)+'%';tgtEl.style.left=(tgt*100)+'%';}
    else{const p=(cur+1)/2*100;if(cur>=0){curEl.style.left='50%';curEl.style.width=(p-50)+'%';}else{curEl.style.left=p+'%';curEl.style.width=(50-p)+'%';}tgtEl.style.left=((tgt+1)/2*100)+'%';}
    valEl.textContent=(tgt>=0?'+':'')+tgt.toFixed(2);
  }
}

// --- Feed ---
function addFeed(tick,type,detail){feedLines.push({tick,type,detail});if(feedLines.length>200)feedLines.shift();}
function renderFeed(){
  const el=document.getElementById('feed');
  const atBot=el.scrollTop+el.clientHeight>=el.scrollHeight-30;
  const tc={axis:'text-blue-400',btn:'text-violet-400',pid:'text-orange-400',mode:'text-emerald-400',input:'text-cyan-400'};
  el.innerHTML=feedLines.map(l=>`
    <div class="flex gap-2 px-3 py-0.5 items-baseline border-b border-slate-800/40 hover:bg-slate-800/30">
      <span class="text-slate-600 tabular-nums w-12 text-right shrink-0">${l.tick}</span>
      <span class="font-semibold w-12 shrink-0 ${tc[l.type]||'text-slate-400'}">${l.type}</span>
      <span class="text-slate-300 truncate">${l.detail}</span>
    </div>`).join('');
  if(atBot)el.scrollTop=el.scrollHeight;
}
function clearFeed(){feedLines=[];renderFeed();}
function detectChanges(prev,curr){
  for(const b of BUTTONS){if(prev.buttons[b]!==curr.buttons[b])addFeed(curr.tick,'btn',`${b} <span class="font-semibold ${curr.buttons[b]?'text-emerald-400':'text-slate-500'}">${curr.buttons[b]?'PRESS':'release'}</span>`);}
  for(const k of AXES){const pv=prev.axes[k]||0,cv=curr.axes[k]||0;if(Math.abs(cv-pv)>0.12)addFeed(curr.tick,'axis',`${k} <span class="font-semibold text-blue-300">${cv>=0?'+':''}${cv.toFixed(3)}</span>`);}
}

// --- WebSocket ---
let ws=null;
function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen=()=>{const b=document.getElementById('status-badge');b.textContent='connected';b.className='text-[10px] font-semibold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400';addFeed(0,'mode','connected');};
  ws.onmessage=(e)=>{try{
    const msg=JSON.parse(e.data);
    if(msg.type==='state'){
      prevState=JSON.parse(JSON.stringify(state));
      if(msg.axes)state.axes={...state.axes,...msg.axes};
      if(msg.buttons)state.buttons={...state.buttons,...msg.buttons};
      if(msg.pid_targets)state.pid_targets=msg.pid_targets;
      if(msg.mode!==undefined){if(state.mode!==msg.mode)addFeed(msg.tick||0,'mode',`<span class="font-semibold">${msg.mode}</span>`);state.mode=msg.mode;}
      if(msg.tick!==undefined)state.tick=msg.tick;
      detectChanges(prevState,state);
    }else if(msg.type==='modes')renderModes(msg.modes,msg.current);
  }catch(err){console.error(err);}};
  ws.onclose=()=>{const b=document.getElementById('status-badge');b.textContent='disconnected';b.className='text-[10px] font-semibold px-2 py-0.5 rounded bg-red-500/10 text-red-400';setTimeout(connect,1000);};
  ws.onerror=()=>ws.close();
}
function renderModes(modes,current){
  document.getElementById('modes').innerHTML=modes.map(m=>
    `<button onclick="sendMode('${m}')" class="px-3 py-1 rounded text-[11px] cursor-pointer transition-all ${m===current?'bg-blue-600/30 text-blue-300 border border-blue-500/40':'bg-slate-800 text-slate-500 border border-slate-700 hover:text-slate-300 hover:border-slate-600'}">${m.replace(/_/g,' ')}</button>`
  ).join('');
}
function sendMode(m){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'set_mode',mode:m}));}

// --- Render loop ---
function loop(){
  updateSVG(); updateAxisBars(); updateButtonGrid(); updatePidPanel();
  fpsFrames++;
  const now=performance.now();
  if(now-lastFpsTime>1000){currentFps=Math.round(fpsFrames*1000/(now-lastFpsTime));fpsFrames=0;lastFpsTime=now;document.getElementById('fps-display').textContent=currentFps+' fps';}
  document.getElementById('tick-display').textContent='tick '+state.tick;
  if(state.tick%3===0)renderFeed();
  requestAnimationFrame(loop);
}

initAxisBars(); initButtonGrid(); initPidPanel(); connect(); loadSVG(); loop();
</script>
</body>
