<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostLobby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #06060c;
    --bg-base: #0a0a12;
    --bg-surface: #0e0e18;
    --bg-elevated: #131320;
    --border-dim: #1a1a2e;
    --border-subtle: #222240;
    --text-primary: #e2e2f0;
    --text-secondary: #8888aa;
    --text-dim: #555570;
    --text-muted: #333350;
    --accent-purple: #8b5cf6;
    --accent-purple-dim: #6d3fd920;
    --accent-cyan: #22d3ee;
    --accent-cyan-dim: #22d3ee15;
    --team-blue: #60a5fa;
    --team-red: #f87171;
    --team-green: #4ade80;
    --team-yellow: #facc15;
    --hp-good: #22c55e;
    --hp-mid: #eab308;
    --hp-low: #ef4444;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--mono);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 40px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    font-size: 12px; font-weight: 700; letter-spacing: 3px;
    color: var(--accent-purple); text-transform: uppercase;
  }
  .logo-sep { color: var(--border-subtle); font-weight: 300; font-size: 14px; margin: 0 2px; }
  .match-title {
    font-size: 10px; font-weight: 400; color: var(--text-dim);
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .status-bar {
    display: flex; gap: 16px; align-items: center;
    font-size: 10px; color: var(--text-dim); font-weight: 400;
  }
  .status-bar .label {
    color: var(--text-muted); margin-right: 3px;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .status-bar .value { color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .conn-dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: #ef4444; margin-right: 4px; vertical-align: middle;
    transition: all 0.3s;
  }
  .conn-dot.live { background: var(--hp-good); box-shadow: 0 0 6px var(--hp-good); }

  /* ── Layout ── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Canvas ── */
  .canvas-wrap {
    flex: 1; position: relative; display: flex;
    align-items: center; justify-content: center; background: var(--bg-deep);
  }
  canvas#arena { border-radius: 2px; cursor: crosshair; }
  canvas#fog { position: absolute; pointer-events: none; z-index: 1; border-radius: 2px; }
  .scanlines {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(6,6,12,0.65) 100%);
  }

  /* ── HUD ── */
  .hud-overlay {
    position: absolute; top: 10px; left: 14px; z-index: 5;
    font-size: 9px; color: var(--text-muted); pointer-events: none;
    line-height: 1.5;
  }
  .hud-overlay .hl { color: var(--accent-cyan); font-weight: 500; }
  .hud-hint { margin-top: 6px; font-size: 8px; color: #2a2a40; letter-spacing: 0.3px; }

  /* ── Controls ── */
  .controls {
    position: absolute; top: 10px; right: 14px; z-index: 5;
    display: flex; gap: 4px;
  }
  .ctrl-btn {
    font-family: var(--mono); font-size: 8px; padding: 3px 8px;
    border-radius: 3px; cursor: pointer; color: var(--text-muted);
    background: var(--bg-surface); border: 1px solid var(--border-dim);
    letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.15s;
  }
  .ctrl-btn:hover { color: var(--text-secondary); border-color: var(--border-subtle); }
  .ctrl-btn.active { color: var(--accent-cyan); border-color: var(--accent-cyan); background: var(--accent-cyan-dim); }

  /* ── Minimap ── */
  .minimap-container {
    position: absolute; bottom: 14px; left: 14px; z-index: 5;
    border: 1px solid var(--border-subtle); border-radius: 3px;
    background: var(--bg-surface); padding: 2px; opacity: 0.8; transition: opacity 0.2s;
  }
  .minimap-container:hover { opacity: 1; }
  .minimap-label {
    position: absolute; top: -14px; left: 0;
    font-size: 8px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── Follow banner ── */
  .follow-banner {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 6; display: none; align-items: center; gap: 8px;
    padding: 5px 12px; background: var(--bg-surface); border: 1px solid var(--accent-cyan);
    border-radius: 4px; font-size: 10px; color: var(--text-secondary);
    white-space: nowrap; animation: bannerIn 0.2s ease;
    box-shadow: 0 0 20px rgba(34,211,238,0.1);
  }
  .follow-banner.visible { display: flex; }
  .follow-banner .follow-label { color: var(--accent-cyan); font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
  .follow-banner .follow-name { font-weight: 600; }
  .follow-banner .follow-dismiss {
    font-family: var(--mono); font-size: 8px; padding: 2px 6px;
    border-radius: 2px; cursor: pointer; color: var(--text-muted);
    background: var(--bg-elevated); border: 1px solid var(--border-dim);
    transition: all 0.15s;
  }
  .follow-banner .follow-dismiss:hover { color: var(--text-secondary); border-color: var(--border-subtle); }
  @keyframes bannerIn {
    from { opacity: 0; transform: translateX(-50%) translateY(6px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Zoom indicator ── */
  .zoom-indicator {
    position: absolute; bottom: 14px; right: 14px; z-index: 5;
    font-size: 9px; color: var(--text-muted); font-variant-numeric: tabular-nums;
    pointer-events: none;
  }

  /* ── Tooltip ── */
  .entity-tooltip {
    position: absolute; z-index: 10; display: none;
    padding: 8px 12px; background: #0c0c16ee; border: 1px solid var(--border-subtle);
    border-radius: 4px; font-size: 10px; color: var(--text-secondary);
    pointer-events: none; white-space: nowrap; line-height: 1.6;
    backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .entity-tooltip .tt-name { font-weight: 600; font-size: 11px; }
  .entity-tooltip .tt-dim { color: var(--text-muted); }
  .entity-tooltip .tt-hp { font-weight: 500; }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px; background: var(--bg-surface); border-left: 1px solid var(--border-dim);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .panel { padding: 12px 14px; border-bottom: 1px solid var(--border-dim); }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .panel-title {
    font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); font-weight: 600;
  }
  .panel-badge {
    font-size: 8px; padding: 2px 6px; border-radius: 3px;
    background: var(--accent-purple-dim); color: var(--accent-purple);
    font-weight: 600; letter-spacing: 0.5px;
  }
  .panel-badge.live { background: rgba(34,197,94,0.1); color: var(--hp-good); }

  /* Scoreboard */
  .score-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 10px; border-radius: 4px; margin-bottom: 3px;
    background: var(--bg-elevated); border: 1px solid var(--border-dim);
  }
  .score-team { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 500; }
  .team-dot { width: 6px; height: 6px; border-radius: 50%; }
  .score-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* Entity list */
  .entity-list { list-style: none; max-height: 200px; overflow-y: auto; }
  .entity-list::-webkit-scrollbar { width: 3px; }
  .entity-list::-webkit-scrollbar-track { background: transparent; }
  .entity-list::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }
  .entity-row {
    display: flex; align-items: center; gap: 6px; padding: 4px 6px;
    border-radius: 3px; cursor: pointer; transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .entity-row:hover { background: var(--bg-elevated); }
  .entity-row.dead { opacity: 0.25; }
  .entity-row.following { background: var(--accent-cyan-dim); border-left-color: var(--accent-cyan); }
  .entity-id { font-size: 9px; color: var(--text-muted); width: 40px; font-variant-numeric: tabular-nums; }
  .entity-weapon { font-size: 8px; color: var(--text-muted); width: 32px; text-transform: uppercase; letter-spacing: 0.3px; }
  .entity-hp-bar { flex: 1; height: 3px; background: var(--bg-deep); border-radius: 2px; overflow: hidden; }
  .entity-hp-fill { height: 100%; border-radius: 2px; transition: width 0.15s ease; }
  .entity-hp-text { font-size: 8px; color: var(--text-muted); width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

  /* Kill feed */
  .kill-feed { list-style: none; }
  .kill-entry {
    display: flex; align-items: center; gap: 5px; padding: 3px 6px;
    font-size: 10px; border-radius: 3px; margin-bottom: 1px;
    animation: killSlide 0.25s ease;
  }
  @keyframes killSlide {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .kill-tick { font-size: 8px; color: var(--text-muted); font-variant-numeric: tabular-nums; width: 40px; }
  .kill-weapon { font-size: 7px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }

  /* Terminal */
  .terminal { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .terminal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; border-bottom: 1px solid var(--border-dim); flex-shrink: 0;
  }
  .terminal-tabs { display: flex; gap: 3px; }
  .terminal-tab {
    font-family: var(--mono); font-size: 9px; padding: 3px 8px; border-radius: 3px;
    cursor: pointer; color: var(--text-muted); letter-spacing: 0.5px;
    text-transform: uppercase; background: transparent;
    border: 1px solid transparent; transition: all 0.15s;
  }
  .terminal-tab:hover { color: var(--text-secondary); background: var(--bg-elevated); }
  .terminal-tab.active { color: var(--accent-cyan); background: var(--accent-cyan-dim); border-color: var(--accent-cyan); }
  .terminal-body {
    flex: 1; overflow-y: auto; padding: 6px 10px;
    font-size: 9.5px; line-height: 1.7; background: var(--bg-deep); min-height: 0;
  }
  .terminal-body::-webkit-scrollbar { width: 3px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }
  .log-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); }
  .log-line .timestamp { color: #333348; }
  .log-line .event-type { font-weight: 600; }
  .log-line .event-kill { color: var(--team-red); }
  .log-line .event-spawn { color: var(--hp-good); }
  .log-line .event-damage { color: var(--hp-mid); }
  .log-line .event-shot { color: var(--text-muted); }
  .log-line .hl-num { color: var(--accent-cyan); }
  .log-line .hl-str { color: #c084fc; }
  .log-line .hl-key { color: var(--text-secondary); }
  .log-line .hl-bracket { color: #444460; }
  .log-line .hl-id { color: var(--team-blue); }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <span class="logo">GhostLobby</span>
    <span class="logo-sep">/</span>
    <span class="match-title" id="match-title">connecting...</span>
  </div>
  <div class="status-bar">
    <span><span class="conn-dot" id="conn-dot"></span><span id="conn-status">offline</span></span>
    <span><span class="label">tick</span><span class="value" id="tick-count">0</span></span>
    <span><span class="label">ent</span><span class="value" id="entity-count">0</span></span>
    <span><span class="label">tps</span><span class="value" id="tps">—</span></span>
    <span><span class="label">fps</span><span class="value" id="fps">—</span></span>
  </div>
</header>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="arena"></canvas>
    <canvas id="fog"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="hud-overlay">
      <div><span class="hl">SYS</span> ghostlobby::engine v0.1.0</div>
      <div><span class="hl">CFG</span> <span id="hud-scenario">—</span></div>
      <div><span class="hl">MAP</span> <span id="hud-arena">—</span></div>
      <div><span class="hl">CAM</span> <span id="hud-cam">1.0x</span></div>
      <div class="hud-hint">scroll=zoom &middot; click=follow &middot; right-drag=pan &middot; esc=reset</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn active" id="btn-fog" onclick="toggleOpt('fog')">fog</button>
      <button class="ctrl-btn active" id="btn-glow" onclick="toggleOpt('glow')">glow</button>
      <button class="ctrl-btn" id="btn-grid" onclick="toggleOpt('grid')">grid</button>
      <button class="ctrl-btn active" id="btn-trails" onclick="toggleOpt('trails')">trails</button>
    </div>
    <div class="minimap-container">
      <span class="minimap-label">minimap</span>
      <canvas id="minimap" width="130" height="130"></canvas>
    </div>
    <div class="follow-banner" id="follow-banner">
      <span class="follow-label">following</span>
      <span class="follow-name" id="follow-name">—</span>
      <button class="follow-dismiss" onclick="stopFollowing()">esc</button>
    </div>
    <div class="zoom-indicator" id="zoom-indicator">1.0x</div>
    <div class="entity-tooltip" id="tooltip"></div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Scoreboard</span>
        <span class="panel-badge live" id="match-status">LIVE</span>
      </div>
      <div class="score-row">
        <div class="score-team">
          <div class="team-dot" style="background:var(--team-blue);box-shadow:0 0 5px var(--team-blue)"></div>
          <span style="color:var(--team-blue)">Blue</span>
        </div>
        <span class="score-value" style="color:var(--team-blue)" id="score-0">0</span>
      </div>
      <div class="score-row">
        <div class="score-team">
          <div class="team-dot" style="background:var(--team-red);box-shadow:0 0 5px var(--team-red)"></div>
          <span style="color:var(--team-red)">Red</span>
        </div>
        <span class="score-value" style="color:var(--team-red)" id="score-1">0</span>
      </div>
    </div>
    <div class="panel" style="flex-shrink:0;">
      <div class="panel-header">
        <span class="panel-title">Agents</span>
        <span class="panel-badge" id="alive-count">0 alive</span>
      </div>
      <ul class="entity-list" id="entity-list"></ul>
    </div>
    <div class="panel" style="flex-shrink:0;max-height:160px;overflow:hidden;">
      <div class="panel-header">
        <span class="panel-title">Kill Feed</span>
      </div>
      <ul class="kill-feed" id="kill-feed"></ul>
    </div>
    <div class="terminal">
      <div class="terminal-header">
        <div class="terminal-tabs">
          <button class="terminal-tab active" onclick="switchTab('events',this)">Events</button>
          <button class="terminal-tab" onclick="switchTab('state',this)">State</button>
          <button class="terminal-tab" onclick="switchTab('perf',this)">Perf</button>
        </div>
        <span style="font-size:8px;color:var(--text-muted);" id="log-count">0</span>
      </div>
      <div class="terminal-body" id="terminal-events"></div>
      <div class="terminal-body" id="terminal-state" style="display:none"></div>
      <div class="terminal-body" id="terminal-perf" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// GHOSTLOBBY VIEWER — HIGH-FIDELITY EDITION
// ══════════════════════════════════════════════════════════════

const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const fogCanvas = document.getElementById('fog');
const fogCtx = fogCanvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

const $ = id => document.getElementById(id);
const followBanner = $('follow-banner');
const followNameEl = $('follow-name');
const zoomIndicator = $('zoom-indicator');
const connDot = $('conn-dot');
const connStatus = $('conn-status');
const matchTitle = $('match-title');
const tickCountEl = $('tick-count');
const entityCountEl = $('entity-count');
const tpsEl = $('tps');
const fpsEl = $('fps');
const entityListEl = $('entity-list');
const killFeedEl = $('kill-feed');
const score0El = $('score-0');
const score1El = $('score-1');
const aliveCountEl = $('alive-count');
const hudCam = $('hud-cam');
const logCountEl = $('log-count');
const termEvents = $('terminal-events');
const termState = $('terminal-state');
const termPerf = $('terminal-perf');

// ── Constants ──
const TEAM_COLORS = ['#60a5fa','#f87171','#4ade80','#facc15'];
const TEAM_GLOW   = ['#3b82f6','#ef4444','#22c55e','#eab308'];
const TEAM_DIM    = ['#1e3a5f','#5f1e1e','#1e5f2e','#5f5a1e'];
const TEAM_NAMES  = ['Blue','Red','Green','Yellow'];

// ── State ──
let state = { entities: [], tick: 0 };
let prevPositions = {};
let arenaW = 1000, arenaH = 1000;
let kills = [], score = [0,0];
let lastSnapTime = 0, snapCount = 0, currentTps = 0;
let entityIdMap = {};
let obstacles = [];

// Effects
let particles = [];
let shotTraces = [];
let dmgNumbers = [];
let decals = [];
let ripples = [];
let ambientParticles = [];
let eventLog = [];

// Camera
let camX = 500, camY = 500, camZoom = 1.0;
const ZOOM_MIN = 1.0, ZOOM_MAX = 8.0, CAM_LERP = 0.08;
let followId = null;
let isPanning = false, panSX = 0, panSY = 0, camSX = 0, camSY = 0;

// Screen shake
let shakeX = 0, shakeY = 0, shakeDecay = 0;

// Render options
let opts = { fog: true, glow: true, grid: false, trails: true };

// FPS
let frameCount = 0, lastFpsTime = performance.now();
let perfHistory = [];

// Mouse hover
let hoverEntity = null, mouseCanvasX = 0, mouseCanvasY = 0;

// ── Helpers ──
function toggleOpt(key) {
  opts[key] = !opts[key];
  $('btn-'+key).classList.toggle('active', opts[key]);
  if (key === 'fog') fogCanvas.style.display = opts.fog ? '' : 'none';
}

function switchTab(name, el) {
  document.querySelectorAll('.terminal-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  termEvents.style.display = name === 'events' ? '' : 'none';
  termState.style.display = name === 'state' ? '' : 'none';
  termPerf.style.display = name === 'perf' ? '' : 'none';
}

function shortId(id) { return '#' + (id % 10000).toString().padStart(4,'0'); }

function resize() {
  const wrap = canvas.parentElement;
  const mW = wrap.clientWidth - 32, mH = wrap.clientHeight - 32;
  const aspect = arenaW / arenaH;
  let w, h;
  if (mW / mH > aspect) { h = mH; w = h * aspect; } else { w = mW; h = w / aspect; }
  canvas.width = Math.floor(w); canvas.height = Math.floor(h);
  fogCanvas.width = canvas.width; fogCanvas.height = canvas.height;
  fogCanvas.style.width = canvas.width + 'px';
  fogCanvas.style.height = canvas.height + 'px';
}

function toCanvas(ax, ay) {
  const ppuX = canvas.width / arenaW, ppuY = canvas.height / arenaH;
  return [
    canvas.width/2 + (ax - camX) * ppuX * camZoom + shakeX,
    canvas.height/2 + (ay - camY) * ppuY * camZoom + shakeY
  ];
}
function fromCanvas(sx, sy) {
  const ppuX = canvas.width / arenaW, ppuY = canvas.height / arenaH;
  return [
    camX + (sx - shakeX - canvas.width/2) / (ppuX * camZoom),
    camY + (sy - shakeY - canvas.height/2) / (ppuY * camZoom)
  ];
}
function S() { return camZoom * canvas.width / arenaW; }
function toMM(ax, ay) { return [(ax/arenaW)*mmCanvas.width, (ay/arenaH)*mmCanvas.height]; }

// ── Weapons ──
const WEAPONS = {
  rifle: [
    {x:-7,y:-1.2,w:5,h:2.4,c:'#3a3530'},
    {x:-2,y:-1.8,w:7,h:3.6,c:'#484440'},
    {x:5,y:-0.7,w:11,h:1.4,c:'#5a5550'},
    {x:0,y:1.8,w:2.2,h:3.5,c:'#3a3530'},
    {x:0,y:-2.4,w:5,h:0.7,c:'#505050'},
    {x:15,y:-1,w:1.8,h:2,c:'#666'},
  ],
  smg: [
    {x:-3,y:-1.5,w:7,h:3,c:'#4a4a48'},
    {x:4,y:-0.6,w:7,h:1.2,c:'#5a5a58'},
    {x:0,y:1.5,w:1.8,h:4.5,c:'#3a3a38'},
    {x:-5,y:-0.8,w:2.5,h:1.6,c:'#383838'},
    {x:10,y:-0.8,w:1.2,h:1.6,c:'#666'},
  ],
  shotgun: [
    {x:-9,y:-1.2,w:6,h:2.4,c:'#4a3828'},
    {x:-3,y:-1.8,w:6,h:3.6,c:'#555048'},
    {x:3,y:-1,w:13,h:2,c:'#5a5550'},
    {x:7,y:-1.5,w:3.5,h:3,c:'#4a3828'},
    {x:15,y:-1.3,w:1.3,h:2.6,c:'#666'},
  ],
  pistol: [
    {x:-0.5,y:-1.2,w:7,h:2.4,c:'#4a4a48'},
    {x:6.5,y:-0.5,w:2.5,h:1,c:'#5a5a58'},
    {x:-0.5,y:1.2,w:2.5,h:4,c:'#3a3530'},
    {x:-0.5,y:4.8,w:2.5,h:0.8,c:'#333'},
  ],
};
const WEAPON_KEYS = ['rifle','smg','shotgun','pistol'];
function weaponFor(e) { return WEAPON_KEYS[e.id % WEAPON_KEYS.length]; }

function drawWeapon(cx, cy, facing, key, scale) {
  const parts = WEAPONS[key]; if (!parts) return;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(facing);
  ctx.scale(scale, scale);
  for (const p of parts) { ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h); }
  ctx.strokeStyle = '#ffffff0a'; ctx.lineWidth = 0.3/scale;
  for (const p of parts) ctx.strokeRect(p.x, p.y, p.w, p.h);
  ctx.restore();
}

// ── Spawners ──
function spawnParticles(x, y, color, count, type) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, spd = 20+Math.random()*70;
    particles.push({
      x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:0.02+Math.random()*0.04,
      size: type==='kill' ? 1.5+Math.random()*2.5 : 0.8+Math.random()*1.5,
      color, type
    });
  }
}

function spawnDmgNumber(x, y, amount, color) {
  dmgNumbers.push({
    x, y, text: '-'+Math.round(amount), color,
    life: 1, vy: -40-Math.random()*20, vx: (Math.random()-0.5)*30,
  });
}

function spawnDecal(x, y, color) {
  decals.push({ x, y, color, alpha: 0.4, size: 8+Math.random()*12 });
  if (decals.length > 60) decals.shift();
}

function spawnRipple(x, y) {
  ripples.push({ x, y, radius: 0, maxRadius: 40+Math.random()*30, alpha: 0.5 });
}

function addShake(intensity) {
  shakeDecay = Math.max(shakeDecay, intensity);
}

function initAmbient() {
  for (let i = 0; i < 40; i++) {
    ambientParticles.push({
      x: Math.random()*arenaW, y: Math.random()*arenaH,
      vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
      size: 0.5+Math.random()*1.5, alpha: 0.1+Math.random()*0.15,
    });
  }
}

// ── Camera ──
function updateCamera() {
  if (followId !== null) {
    const t = state.entities.find(e => e.id === followId);
    if (t && !t.is_dead) {
      camX += (t.position[0]-camX)*CAM_LERP;
      camY += (t.position[1]-camY)*CAM_LERP;
    } else if (t?.is_dead) stopFollowing();
  }
  // Shake decay
  if (shakeDecay > 0.01) {
    shakeX = (Math.random()-0.5)*shakeDecay*6;
    shakeY = (Math.random()-0.5)*shakeDecay*6;
    shakeDecay *= 0.88;
  } else { shakeX = 0; shakeY = 0; shakeDecay = 0; }

  zoomIndicator.textContent = camZoom.toFixed(1)+'x';
  hudCam.textContent = `${camZoom.toFixed(1)}x @ ${Math.round(camX)},${Math.round(camY)}`;
}

function followEntity(id) {
  followId = id;
  const e = entityIdMap[id], col = e ? TEAM_COLORS[e.team]||'#fff' : '#fff';
  const wep = e ? weaponFor(e).toUpperCase() : '';
  followNameEl.innerHTML = `<span style="color:${col}">${shortId(id)}</span> <span style="color:var(--text-muted);font-size:8px">${wep}</span>`;
  followBanner.classList.add('visible');
  if (camZoom < 2.5) camZoom = 3.5;
  updateEntityList();
}
function stopFollowing() {
  followId = null;
  followBanner.classList.remove('visible');
  updateEntityList();
}

// ══════════════════════════════════════════════════════════════
// DRAW LOOP
// ══════════════════════════════════════════════════════════════
function draw() {
  const w = canvas.width, h = canvas.height;
  updateCamera();

  // Background
  ctx.fillStyle = '#07070e';
  ctx.fillRect(0,0,w,h);

  // Ambient noise
  ctx.globalAlpha = 0.01;
  for (let i = 0; i < 30; i++) {
    ctx.fillStyle = Math.random()>0.5 ? '#ffffff' : '#8b5cf6';
    ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Arena boundary
  drawArenaBounds(w, h);

  // Grid
  opts.grid ? drawDotGrid(w,h) : drawLineGrid(w,h);

  // Obstacles
  drawObstacles(w,h);

  // Decals
  drawDecals(w,h);

  // Ambient particles
  drawAmbient(w,h);

  // Ripples
  drawRipples(w,h);

  // Shot traces
  drawShots(w,h);

  // Particles
  drawParticles(w,h);

  // Entities
  drawEntities(w,h);

  // Damage numbers
  drawDmgNumbers(w,h);

  // Fog
  if (opts.fog) drawFog(w,h);

  // Minimap
  drawMinimap();

  // Tooltip
  updateTooltip();

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime > 1000) {
    fpsEl.textContent = Math.round(frameCount/((now-lastFpsTime)/1000));
    frameCount = 0; lastFpsTime = now;
  }
  requestAnimationFrame(draw);
}

// ── Arena boundary ──
function drawArenaBounds(w, h) {
  const [x0,y0] = toCanvas(0,0);
  const [x1,y1] = toCanvas(arenaW,arenaH);
  const bw = x1-x0, bh = y1-y0;

  // Outer darkness
  ctx.fillStyle = '#040408';
  if (y0 > 0) ctx.fillRect(0,0,w,y0);
  if (y1 < h) ctx.fillRect(0,y1,w,h-y1);
  if (x0 > 0) ctx.fillRect(0,y0,x0,bh);
  if (x1 < w) ctx.fillRect(x1,y0,w-x1,bh);

  // Border glow
  ctx.strokeStyle = '#8b5cf620';
  ctx.lineWidth = 2;
  ctx.strokeRect(x0,y0,bw,bh);
  ctx.strokeStyle = '#8b5cf610';
  ctx.lineWidth = 6;
  ctx.strokeRect(x0-2,y0-2,bw+4,bh+4);

  // Corner marks
  const cLen = Math.min(20, bw*0.05);
  ctx.strokeStyle = '#8b5cf640';
  ctx.lineWidth = 1.5;
  // TL
  ctx.beginPath(); ctx.moveTo(x0,y0+cLen); ctx.lineTo(x0,y0); ctx.lineTo(x0+cLen,y0); ctx.stroke();
  // TR
  ctx.beginPath(); ctx.moveTo(x1-cLen,y0); ctx.lineTo(x1,y0); ctx.lineTo(x1,y0+cLen); ctx.stroke();
  // BL
  ctx.beginPath(); ctx.moveTo(x0,y1-cLen); ctx.lineTo(x0,y1); ctx.lineTo(x0+cLen,y1); ctx.stroke();
  // BR
  ctx.beginPath(); ctx.moveTo(x1-cLen,y1); ctx.lineTo(x1,y1); ctx.lineTo(x1,y1-cLen); ctx.stroke();

  // Danger zone glow at edges (inner)
  if (camZoom > 1.5) {
    const dangerW = 15 * S();
    const gT = ctx.createLinearGradient(x0,y0,x0,y0+dangerW);
    gT.addColorStop(0,'#ef444410'); gT.addColorStop(1,'transparent');
    ctx.fillStyle = gT; ctx.fillRect(x0,y0,bw,dangerW);
    const gB = ctx.createLinearGradient(x0,y1,x0,y1-dangerW);
    gB.addColorStop(0,'#ef444410'); gB.addColorStop(1,'transparent');
    ctx.fillStyle = gB; ctx.fillRect(x0,y1-dangerW,bw,dangerW);
    const gL = ctx.createLinearGradient(x0,y0,x0+dangerW,y0);
    gL.addColorStop(0,'#ef444410'); gL.addColorStop(1,'transparent');
    ctx.fillStyle = gL; ctx.fillRect(x0,y0,dangerW,bh);
    const gR = ctx.createLinearGradient(x1,y0,x1-dangerW,y0);
    gR.addColorStop(0,'#ef444410'); gR.addColorStop(1,'transparent');
    ctx.fillStyle = gR; ctx.fillRect(x1-dangerW,y0,dangerW,bh);
  }
}

function drawLineGrid(w, h) {
  const step = 100;
  ctx.strokeStyle = '#0c0c18'; ctx.lineWidth = 0.5;
  for (let x = 0; x <= arenaW; x += step) {
    const [cx] = toCanvas(x,0), [,y0] = toCanvas(0,0), [,y1] = toCanvas(0,arenaH);
    if (cx < -1||cx > w+1) continue;
    ctx.beginPath(); ctx.moveTo(cx,y0); ctx.lineTo(cx,y1); ctx.stroke();
  }
  for (let y = 0; y <= arenaH; y += step) {
    const [,cy] = toCanvas(0,y), [x0] = toCanvas(0,0), [x1] = toCanvas(arenaW,0);
    if (cy < -1||cy > h+1) continue;
    ctx.beginPath(); ctx.moveTo(x0,cy); ctx.lineTo(x1,cy); ctx.stroke();
  }
}

function drawDotGrid(w, h) {
  const step = 50;
  ctx.fillStyle = '#181830';
  for (let x = 0; x <= arenaW; x += step) {
    for (let y = 0; y <= arenaH; y += step) {
      const [cx,cy] = toCanvas(x,y);
      if (cx<-1||cx>w+1||cy<-1||cy>h+1) continue;
      ctx.fillRect(cx,cy,1,1);
    }
  }
}

function drawObstacles(w, h) {
  for (const obs of obstacles) {
    const [ox,oy] = toCanvas(obs.x,obs.y);
    const [ox2,oy2] = toCanvas(obs.x+obs.width,obs.y+obs.height);
    const ow = ox2-ox, oh = oy2-oy;
    if (ox+ow < -10||ox > w+10||oy+oh < -10||oy > h+10) continue;

    // Shadow
    ctx.fillStyle = '#06060c'; ctx.fillRect(ox+3,oy+3,ow,oh);
    // Fill
    ctx.fillStyle = '#12122a'; ctx.fillRect(ox,oy,ow,oh);
    // Hatch pattern
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#8b5cf6';
    ctx.lineWidth = 0.5;
    const hStep = Math.max(6, 8*S()/0.7);
    ctx.beginPath();
    for (let d = -ow; d < ow+oh; d += hStep) {
      ctx.moveTo(ox+Math.max(0,d), oy+Math.max(0,-d));
      ctx.lineTo(ox+Math.min(ow,d+oh), oy+Math.min(oh,oh-d));
    }
    ctx.stroke();
    ctx.restore();
    // Border
    ctx.strokeStyle = '#222244'; ctx.lineWidth = 1; ctx.strokeRect(ox,oy,ow,oh);
    // Top highlight
    ctx.strokeStyle = '#2a2a50'; ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+ow,oy); ctx.stroke();
  }
}

function drawDecals(w, h) {
  for (const d of decals) {
    const [cx,cy] = toCanvas(d.x,d.y);
    if (cx<-30||cx>w+30||cy<-30||cy>h+30) continue;
    const sz = d.size * S() / 0.7;
    ctx.globalAlpha = d.alpha;
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,sz);
    g.addColorStop(0, d.color+'40'); g.addColorStop(1, d.color+'00');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx,cy,sz,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    d.alpha *= 0.9995;
  }
}

function drawAmbient(w, h) {
  ctx.globalAlpha = 1;
  for (const p of ambientParticles) {
    p.x += p.vx*0.016; p.y += p.vy*0.016;
    if (p.x < 0) p.x = arenaW; if (p.x > arenaW) p.x = 0;
    if (p.y < 0) p.y = arenaH; if (p.y > arenaH) p.y = 0;
    const [cx,cy] = toCanvas(p.x,p.y);
    if (cx<-5||cx>w+5||cy<-5||cy>h+5) continue;
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#8b5cf6';
    const sz = p.size * S() / 0.7;
    ctx.fillRect(cx,cy,sz,sz);
  }
  ctx.globalAlpha = 1;
}

function drawRipples(w, h) {
  ripples = ripples.filter(r => {
    r.radius += 2.5;
    r.alpha -= 0.015;
    if (r.alpha <= 0) return false;
    const [cx,cy] = toCanvas(r.x,r.y);
    const rad = r.radius * S() / 0.7;
    ctx.strokeStyle = `rgba(139,92,246,${r.alpha*0.3})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.stroke();
    return true;
  });
}

function drawShots(w, h) {
  const s = S();
  shotTraces = shotTraces.filter(t => {
    t.alpha -= 0.035;
    if (t.alpha <= 0) return false;
    const [ox,oy] = toCanvas(t.ox,t.oy);
    const [ex,ey] = toCanvas(t.ex,t.ey);

    if (opts.glow && t.hit) {
      ctx.save(); ctx.shadowColor='#fbbf24'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ex,ey);
      ctx.strokeStyle = `rgba(251,191,36,${t.alpha*0.5})`; ctx.lineWidth=2.5; ctx.stroke();
      ctx.restore();
    }
    ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ex,ey);
    if (t.hit) {
      ctx.strokeStyle = `rgba(255,220,80,${t.alpha})`; ctx.lineWidth=1.5;
    } else {
      ctx.strokeStyle = `rgba(80,80,120,${t.alpha*0.4})`; ctx.lineWidth=0.5;
    }
    ctx.stroke();

    // Muzzle flash
    if (t.alpha > 0.7) {
      ctx.save();
      ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 15 * t.alpha;
      ctx.fillStyle = `rgba(255,240,150,${(t.alpha-0.7)*3})`;
      ctx.beginPath(); ctx.arc(ox,oy, 3*s/0.7, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    return true;
  });
}

function drawParticles(w, h) {
  const s = S();
  particles = particles.filter(p => {
    p.life -= p.decay; if (p.life <= 0) return false;
    p.x += p.vx*0.016; p.y += p.vy*0.016;
    p.vx *= 0.95; p.vy *= 0.95;
    const [cx,cy] = toCanvas(p.x,p.y);
    if (cx<-20||cx>w+20||cy<-20||cy>h+20) return true;
    const sz = p.size * p.life * Math.max(1,s/0.7);
    if (opts.glow && p.type==='kill') {
      ctx.save(); ctx.shadowColor=p.color; ctx.shadowBlur=8;
      ctx.fillStyle = p.color; ctx.globalAlpha = p.life*0.8;
      ctx.fillRect(cx-sz/2,cy-sz/2,sz,sz);
      ctx.restore(); ctx.globalAlpha=1;
    } else {
      ctx.fillStyle = p.color; ctx.globalAlpha = p.life*0.5;
      ctx.fillRect(cx-sz/2,cy-sz/2,sz,sz); ctx.globalAlpha=1;
    }
    return true;
  });
}

function drawEntities(w, h) {
  const s = S();
  hoverEntity = null;

  for (const e of state.entities) {
    // Interpolate position
    const prev = prevPositions[e.id];
    let drawX = e.position[0], drawY = e.position[1];
    if (prev) {
      drawX = prev.x + (e.position[0]-prev.x)*0.3;
      drawY = prev.y + (e.position[1]-prev.y)*0.3;
      prev.x = drawX; prev.y = drawY;
    } else {
      prevPositions[e.id] = { x: drawX, y: drawY };
    }

    const [cx,cy] = toCanvas(drawX, drawY);
    if (cx < -60||cx > w+60||cy < -60||cy > h+60) continue;

    const col = TEAM_COLORS[e.team]||'#fff';
    const dim = TEAM_DIM[e.team]||'#333';
    const glow = TEAM_GLOW[e.team]||'#fff';
    const rad = Math.max(4, 7*s/0.7);

    // Check hover
    const mdx = mouseCanvasX-cx, mdy = mouseCanvasY-cy;
    if (mdx*mdx+mdy*mdy < (rad+5)*(rad+5) && !e.is_dead) hoverEntity = e;

    if (e.is_dead) {
      const ds = Math.max(2, 2.5*s/0.7);
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = dim; ctx.fillRect(cx-ds,cy-ds,ds*2,ds*2);
      ctx.strokeStyle = '#ff444450'; ctx.lineWidth = Math.max(0.5,s/0.7*0.4);
      ctx.beginPath();
      ctx.moveTo(cx-ds,cy-ds); ctx.lineTo(cx+ds,cy+ds);
      ctx.moveTo(cx+ds,cy-ds); ctx.lineTo(cx-ds,cy+ds);
      ctx.stroke(); ctx.globalAlpha = 1;
      continue;
    }

    // Drop shadow
    ctx.fillStyle = '#00000030';
    ctx.beginPath(); ctx.ellipse(cx+1.5, cy+2, rad*0.9, rad*0.5, 0, 0, Math.PI*2); ctx.fill();

    // Selection ring
    if (e.id === followId) {
      ctx.save(); ctx.strokeStyle='#22d3ee'; ctx.lineWidth=1.5;
      ctx.shadowColor='#22d3ee'; ctx.shadowBlur=12;
      ctx.setLineDash([4,3]); ctx.beginPath();
      ctx.arc(cx,cy,rad+5+Math.sin(performance.now()*0.003)*1.5,0,Math.PI*2);
      ctx.stroke(); ctx.setLineDash([]); ctx.restore();
    }

    // Velocity trail
    if (opts.trails && e.velocity) {
      const spd = Math.sqrt(e.velocity[0]**2+e.velocity[1]**2);
      if (spd > 10) {
        const tLen = Math.min(spd*0.3, 60);
        const vn = [-e.velocity[0]/spd, -e.velocity[1]/spd];
        const [tx,ty] = toCanvas(drawX+vn[0]*tLen, drawY+vn[1]*tLen);
        const g = ctx.createLinearGradient(cx,cy,tx,ty);
        g.addColorStop(0,col+'50'); g.addColorStop(1,col+'00');
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(tx,ty);
        ctx.strokeStyle = g; ctx.lineWidth = Math.max(2,3*s/0.7); ctx.stroke();
      }
    }

    // FOV cone
    const fovA = 0.65, fovR = Math.max(25,50*s/0.7);
    const fg = ctx.createRadialGradient(cx,cy,0,cx,cy,fovR);
    fg.addColorStop(0,dim+'25'); fg.addColorStop(1,dim+'00');
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,fovR,e.facing-fovA,e.facing+fovA);
    ctx.closePath(); ctx.fillStyle=fg; ctx.fill();

    // Glow
    if (opts.glow) {
      ctx.save(); ctx.shadowColor=glow; ctx.shadowBlur=Math.max(6,14*s/0.7);
      ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      ctx.restore();
    }

    // Hex body
    ctx.beginPath();
    for (let i=0;i<6;i++) {
      const a=(Math.PI/3)*i-Math.PI/6;
      const px=cx+rad*Math.cos(a), py=cy+rad*Math.sin(a);
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
    // Inner shading
    const ig = ctx.createRadialGradient(cx-rad*0.3,cy-rad*0.3,0,cx,cy,rad);
    ig.addColorStop(0,'#ffffff15'); ig.addColorStop(1,'#00000020');
    ctx.fillStyle=ig; ctx.fill();
    ctx.strokeStyle='#ffffff18'; ctx.lineWidth=0.5; ctx.stroke();

    // Center pip
    ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,1.5*s/0.7),0,Math.PI*2);
    ctx.fillStyle='#ffffff60'; ctx.fill();

    // Weapon
    const wKey = weaponFor(e);
    const wScale = Math.max(0.35, 0.65*s/0.7);
    drawWeapon(cx+Math.cos(e.facing)*rad*0.55, cy+Math.sin(e.facing)*rad*0.55, e.facing, wKey, wScale);

    // Health bar
    const bW = Math.max(12,20*s/0.7), bH = Math.max(1.5,2*s/0.7);
    const bX = cx-bW/2, bY = cy-rad-Math.max(4,6*s/0.7);
    const hp = Math.max(0,e.health/e.max_health);
    const hpC = hp>0.5?'#22c55e':hp>0.25?'#eab308':'#ef4444';
    ctx.fillStyle='#06060c'; ctx.fillRect(bX-0.5,bY-0.5,bW+1,bH+1);
    ctx.fillStyle='#161628'; ctx.fillRect(bX,bY,bW,bH);
    if (opts.glow && hp < 0.3) {
      ctx.save(); ctx.shadowColor=hpC; ctx.shadowBlur=4;
      ctx.fillStyle=hpC; ctx.fillRect(bX,bY,bW*hp,bH);
      ctx.restore();
    } else {
      ctx.fillStyle=hpC; ctx.fillRect(bX,bY,bW*hp,bH);
    }

    // ID label when zoomed
    if (camZoom >= 2) {
      const lY = bY - Math.max(3,5*s/0.7);
      ctx.font = `${Math.max(6,8*s/0.7)}px 'JetBrains Mono',monospace`;
      ctx.fillStyle='#ffffff40'; ctx.textAlign='center';
      ctx.fillText(shortId(e.id), cx, lY);
      ctx.textAlign='start';
    }
  }
}

function drawDmgNumbers(w, h) {
  const s = S();
  dmgNumbers = dmgNumbers.filter(d => {
    d.life -= 0.015;
    if (d.life <= 0) return false;
    d.y += d.vy*0.016; d.x += d.vx*0.016;
    d.vy *= 0.97;
    const [cx,cy] = toCanvas(d.x,d.y);
    if (cx<-30||cx>w+30||cy<-30||cy>h+30) return true;
    const sz = Math.max(8, 11*s/0.7);
    ctx.font = `700 ${sz}px 'JetBrains Mono',monospace`;
    ctx.globalAlpha = d.life;
    ctx.fillStyle = d.color;
    ctx.textAlign = 'center';
    ctx.fillText(d.text, cx, cy);
    ctx.textAlign = 'start';
    ctx.globalAlpha = 1;
    return true;
  });
}

function drawFog(w, h) {
  const s = S();
  fogCtx.clearRect(0,0,w,h);
  fogCtx.fillStyle = 'rgba(6,6,12,0.65)'; fogCtx.fillRect(0,0,w,h);
  fogCtx.globalCompositeOperation = 'destination-out';
  for (const e of state.entities) {
    if (e.is_dead) continue;
    const [cx,cy] = toCanvas(e.position[0],e.position[1]);
    const vr = Math.max(35,75*s/0.7);
    const g = fogCtx.createRadialGradient(cx,cy,0,cx,cy,vr);
    g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(0.5,'rgba(0,0,0,0.8)'); g.addColorStop(1,'rgba(0,0,0,0)');
    fogCtx.fillStyle=g; fogCtx.beginPath(); fogCtx.arc(cx,cy,vr,0,Math.PI*2); fogCtx.fill();
    // FOV cut
    const fr = Math.max(50,110*s/0.7);
    const fg = fogCtx.createRadialGradient(cx,cy,8,cx,cy,fr);
    fg.addColorStop(0,'rgba(0,0,0,0.9)'); fg.addColorStop(0.6,'rgba(0,0,0,0.5)'); fg.addColorStop(1,'rgba(0,0,0,0)');
    fogCtx.fillStyle=fg; fogCtx.beginPath(); fogCtx.moveTo(cx,cy);
    fogCtx.arc(cx,cy,fr,e.facing-0.6,e.facing+0.6); fogCtx.closePath(); fogCtx.fill();
  }
  fogCtx.globalCompositeOperation = 'source-over';
}

function drawMinimap() {
  const mw = mmCanvas.width, mh = mmCanvas.height;
  mmCtx.fillStyle = '#08080f'; mmCtx.fillRect(0,0,mw,mh);
  // Grid
  mmCtx.strokeStyle = '#111120'; mmCtx.lineWidth = 0.3;
  for (let x = 0; x <= arenaW; x += 200) {
    const mx = x/arenaW*mw; mmCtx.beginPath(); mmCtx.moveTo(mx,0); mmCtx.lineTo(mx,mh); mmCtx.stroke();
  }
  for (let y = 0; y <= arenaH; y += 200) {
    const my = y/arenaH*mh; mmCtx.beginPath(); mmCtx.moveTo(0,my); mmCtx.lineTo(mw,my); mmCtx.stroke();
  }
  // Border
  mmCtx.strokeStyle='#222240'; mmCtx.lineWidth=0.5; mmCtx.strokeRect(0,0,mw,mh);
  // Obstacles
  mmCtx.fillStyle = '#181830';
  for (const obs of obstacles) {
    const [ox,oy] = toMM(obs.x,obs.y);
    mmCtx.fillRect(ox,oy,(obs.width/arenaW)*mw,(obs.height/arenaH)*mh);
  }
  // Entities
  for (const e of state.entities) {
    const [mx,my] = toMM(e.position[0],e.position[1]);
    if (e.is_dead) { mmCtx.globalAlpha=0.15; mmCtx.fillStyle='#555'; mmCtx.fillRect(mx-0.5,my-0.5,1,1); mmCtx.globalAlpha=1; continue; }
    if (e.id===followId) {
      mmCtx.fillStyle='#22d3ee'; mmCtx.fillRect(mx-2,my-2,4,4);
      // Facing indicator
      mmCtx.strokeStyle='#22d3ee'; mmCtx.lineWidth=0.5;
      mmCtx.beginPath(); mmCtx.moveTo(mx,my);
      mmCtx.lineTo(mx+Math.cos(e.facing)*6, my+Math.sin(e.facing)*6); mmCtx.stroke();
    } else {
      mmCtx.fillStyle = TEAM_COLORS[e.team]||'#fff'; mmCtx.fillRect(mx-1,my-1,2,2);
    }
  }
  // Viewport rect
  if (camZoom > 1.05) {
    const vw=arenaW/camZoom, vh=arenaH/camZoom;
    const vx=(camX-vw/2)/arenaW*mw, vy=(camY-vh/2)/arenaH*mh;
    mmCtx.strokeStyle='#22d3ee60'; mmCtx.lineWidth=1;
    mmCtx.strokeRect(vx,vy,vw/arenaW*mw,vh/arenaH*mh);
  }
}

function updateTooltip() {
  if (hoverEntity && !isPanning) {
    const e = hoverEntity;
    const col = TEAM_COLORS[e.team]||'#fff';
    const hp = Math.max(0,e.health/e.max_health);
    const hpC = hp>0.5?'var(--hp-good)':hp>0.25?'var(--hp-mid)':'var(--hp-low)';
    const wep = weaponFor(e);
    const spd = e.velocity ? Math.round(Math.sqrt(e.velocity[0]**2+e.velocity[1]**2)) : 0;
    tooltip.innerHTML = `<div class="tt-name" style="color:${col}">${shortId(e.id)} <span class="tt-dim">${TEAM_NAMES[e.team]||'?'}</span></div>`
      + `<div><span class="tt-dim">hp</span> <span class="tt-hp" style="color:${hpC}">${Math.round(e.health)}</span><span class="tt-dim">/${Math.round(e.max_health)}</span></div>`
      + `<div><span class="tt-dim">weapon</span> ${wep}</div>`
      + `<div><span class="tt-dim">speed</span> ${spd}</div>`
      + `<div><span class="tt-dim">facing</span> ${(e.facing*180/Math.PI).toFixed(0)}&deg;</div>`;
    const rect = canvas.getBoundingClientRect();
    tooltip.style.display = 'block';
    tooltip.style.left = (mouseCanvasX + rect.left + 14) + 'px';
    tooltip.style.top = (mouseCanvasY + rect.top - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
}

// ── Terminal ──
function logEvent(tick, type, detail) {
  const ts = String(tick).padStart(6,'0');
  let html = `<span class="timestamp">[${ts}]</span> `;
  const cls = {kill:'event-kill',spawn:'event-spawn',damage:'event-damage',shot:'event-shot'}[type]||'';
  html += `<span class="event-type ${cls}">${type.toUpperCase().padEnd(5)}</span> ${detail}`;
  eventLog.unshift(html);
  if (eventLog.length > 200) eventLog.pop();
  termEvents.innerHTML = eventLog.slice(0,60).map(l=>`<div class="log-line">${l}</div>`).join('');
  logCountEl.textContent = eventLog.length;
}

function updateStateView() {
  const alive = state.entities.filter(e=>!e.is_dead);
  const teams = {};
  for (const e of state.entities) {
    const t = TEAM_NAMES[e.team]||'T'+e.team;
    if (!teams[t]) teams[t] = {alive:0,dead:0,hp:0};
    e.is_dead ? teams[t].dead++ : (teams[t].alive++, teams[t].hp += Math.round(e.health));
  }
  let h = `<div class="log-line"><span class="hl-bracket">{</span></div>`;
  h += `<div class="log-line">  <span class="hl-key">"tick"</span>: <span class="hl-num">${state.tick}</span>,</div>`;
  h += `<div class="log-line">  <span class="hl-key">"alive"</span>: <span class="hl-num">${alive.length}</span> / <span class="hl-num">${state.entities.length}</span>,</div>`;
  h += `<div class="log-line">  <span class="hl-key">"score"</span>: [<span class="hl-num">${score[0]}</span>, <span class="hl-num">${score[1]}</span>],</div>`;
  h += `<div class="log-line">  <span class="hl-key">"teams"</span>: <span class="hl-bracket">{</span></div>`;
  for (const [n,d] of Object.entries(teams))
    h += `<div class="log-line">    <span class="hl-str">"${n}"</span>: { <span class="hl-key">alive</span>: <span class="hl-num">${d.alive}</span>, <span class="hl-key">dead</span>: <span class="hl-num">${d.dead}</span>, <span class="hl-key">hp</span>: <span class="hl-num">${d.hp}</span> }</div>`;
  h += `<div class="log-line">  <span class="hl-bracket">}</span></div>`;
  h += `<div class="log-line"><span class="hl-bracket">}</span></div>`;
  termState.innerHTML = h;
}

function updatePerfView() {
  perfHistory.push({tps:currentTps,ent:state.entities.length});
  if (perfHistory.length>60) perfHistory.shift();
  let h = '';
  h += `<div class="log-line"><span class="hl-key">server_tps  </span> <span class="hl-num">${currentTps}</span></div>`;
  h += `<div class="log-line"><span class="hl-key">client_fps  </span> <span class="hl-num">${fpsEl.textContent}</span></div>`;
  h += `<div class="log-line"><span class="hl-key">entities    </span> <span class="hl-num">${state.entities.length}</span></div>`;
  h += `<div class="log-line"><span class="hl-key">particles   </span> <span class="hl-num">${particles.length}</span></div>`;
  h += `<div class="log-line"><span class="hl-key">decals      </span> <span class="hl-num">${decals.length}</span></div>`;
  h += `<div class="log-line"><span class="hl-key">shot_traces </span> <span class="hl-num">${shotTraces.length}</span></div>`;
  const vals = perfHistory.map(p=>p.tps), mx = Math.max(...vals,1);
  const bars = '▁▂▃▄▅▆▇█';
  const spark = vals.map(v=>bars[Math.min(Math.floor(v/mx*7),7)]).join('');
  h += `<div class="log-line"></div><div class="log-line"><span class="hl-key">tps_graph   </span> <span class="hl-str">${spark}</span></div>`;
  termPerf.innerHTML = h;
}

// ── Entity list ──
function updateEntityList() {
  const alive = state.entities.filter(e=>!e.is_dead);
  aliveCountEl.textContent = `${alive.length} alive`;
  entityListEl.innerHTML = state.entities
    .sort((a,b) => a.team-b.team||a.id-b.id)
    .map(e => {
      const col = TEAM_COLORS[e.team]||'#fff';
      const hp = Math.max(0,e.health/e.max_health)*100;
      const hpC = hp>50?'var(--hp-good)':hp>25?'var(--hp-mid)':'var(--hp-low)';
      const dc = e.is_dead?' dead':'';
      const fc = e.id===followId?' following':'';
      const wep = weaponFor(e);
      return `<li class="entity-row${dc}${fc}" onclick="followEntity(${e.id})">
        <span style="color:${col};font-size:7px">&#x2B22;</span>
        <span class="entity-id">${shortId(e.id)}</span>
        <span class="entity-weapon">${wep.slice(0,3)}</span>
        <div class="entity-hp-bar"><div class="entity-hp-fill" style="width:${hp}%;background:${hpC}"></div></div>
        <span class="entity-hp-text">${e.is_dead?'---':Math.round(e.health)}</span>
      </li>`;
    }).join('');
}

// ── Kill feed ──
function addKill(tick, killerId, victimId) {
  const kTeam = entityIdMap[killerId]?.team??0, vTeam = entityIdMap[victimId]?.team??1;
  const kCol = TEAM_COLORS[kTeam]||'#fff', vCol = TEAM_COLORS[vTeam]||'#fff';
  if (kTeam !== vTeam) score[kTeam] = (score[kTeam]||0)+1;
  score0El.textContent = score[0]; score1El.textContent = score[1];

  const wep = entityIdMap[killerId] ? weaponFor(entityIdMap[killerId]) : 'rifle';
  kills.unshift({tick,killerId,victimId,kCol,vCol,wep});
  if (kills.length>12) kills.pop();

  killFeedEl.innerHTML = kills.map(k=>
    `<li class="kill-entry">
      <span class="kill-tick">${String(k.tick).padStart(6,'0')}</span>
      <span style="color:${k.kCol};font-weight:500">${shortId(k.killerId)}</span>
      <span class="kill-weapon">${k.wep.slice(0,3)}</span>
      <span style="color:${k.vCol};font-weight:500">${shortId(k.victimId)}</span>
    </li>`
  ).join('');

  const victim = entityIdMap[victimId];
  if (victim) {
    spawnParticles(victim.position[0],victim.position[1],vCol,18,'kill');
    spawnDecal(victim.position[0],victim.position[1],vCol);
    addShake(1.2);
  }
  logEvent(tick,'kill',`<span class="hl-id">${shortId(killerId)}</span> eliminated <span class="hl-id">${shortId(victimId)}</span>`);
}

// ── WebSocket ──
function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws/observe`);
  ws.onopen = () => { connStatus.textContent='live'; connDot.classList.add('live'); logEvent(0,'sys','connected to /ws/observe'); };
  ws.onclose = () => { connStatus.textContent='offline'; connDot.classList.remove('live'); setTimeout(connect,2000); };
  ws.onerror = () => { connStatus.textContent='error'; connDot.classList.remove('live'); };
  ws.onmessage = (ev) => {
    try {
      const d = JSON.parse(ev.data);
      if (d.type==='WorldSnapshot') {
        state = {entities:d.entities,tick:d.tick};
        tickCountEl.textContent = d.tick.toLocaleString();
        entityCountEl.textContent = d.entities.length;
        for (const e of d.entities) entityIdMap[e.id]=e;
        snapCount++;
        const now = performance.now();
        if (now-lastSnapTime>1000) {
          currentTps = Math.round(snapCount/((now-lastSnapTime)/1000));
          tpsEl.textContent = currentTps.toLocaleString();
          snapCount=0; lastSnapTime=now;
        }
        updateEntityList(); updateStateView(); updatePerfView();
      } else if (d.type==='Kill') {
        addKill(d.tick,d.killer,d.victim);
      } else if (d.type==='Damage') {
        const t = entityIdMap[d.target];
        if (t) {
          spawnParticles(t.position[0],t.position[1],'#ff6b6b',5,'damage');
          spawnDmgNumber(t.position[0],t.position[1], d.amount||10, '#ff6b6b');
          logEvent(d.tick,'damage',`<span class="hl-id">${shortId(d.target)}</span> <span class="hl-num">-${(d.amount||0).toFixed(1)}</span>`);
        }
      } else if (d.type==='ShotFired') {
        const range=500;
        shotTraces.push({
          ox:d.origin[0],oy:d.origin[1],
          ex:d.origin[0]+d.direction[0]*range, ey:d.origin[1]+d.direction[1]*range,
          hit:d.hit_target!==null, alpha:1
        });
        spawnRipple(d.origin[0],d.origin[1]);
      } else if (d.type==='Spawn') {
        logEvent(d.tick,'spawn',`<span class="hl-id">${shortId(d.entity_id||0)}</span> spawned`);
        if (d.position) spawnParticles(d.position[0],d.position[1],'#4ade80',10,'spawn');
      }
    } catch(e) {}
  };
}

// ── Camera controls ──
canvas.addEventListener('wheel', ev => {
  ev.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx=ev.clientX-rect.left, my=ev.clientY-rect.top;
  const [ax,ay] = fromCanvas(mx,my);
  const f = ev.deltaY<0 ? 1.06 : 1/1.06;
  camZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, camZoom*f));
  if (camZoom > ZOOM_MIN+0.01) {
    const ppuX=canvas.width/arenaW, ppuY=canvas.height/arenaH;
    camX = ax-(mx-canvas.width/2)/(ppuX*camZoom);
    camY = ay-(my-canvas.height/2)/(ppuY*camZoom);
  } else { camX=arenaW/2; camY=arenaH/2; if (followId!==null) stopFollowing(); }
}, {passive:false});

canvas.addEventListener('click', ev => {
  if (isPanning) return;
  const rect = canvas.getBoundingClientRect();
  const [ax,ay] = fromCanvas(ev.clientX-rect.left, ev.clientY-rect.top);
  let best=null, bestD=Infinity;
  for (const e of state.entities) {
    if (e.is_dead) continue;
    const d = Math.hypot(e.position[0]-ax, e.position[1]-ay);
    if (d < 20/camZoom && d < bestD) { best=e; bestD=d; }
  }
  best ? followEntity(best.id) : stopFollowing();
});

canvas.addEventListener('mousedown', ev => {
  if (ev.button===1||ev.button===2) {
    ev.preventDefault(); isPanning=true;
    panSX=ev.clientX; panSY=ev.clientY; camSX=camX; camSY=camY;
    canvas.style.cursor='grabbing';
    if (followId!==null) stopFollowing();
  }
});
window.addEventListener('mousemove', ev => {
  if (isPanning) {
    const ppuX=canvas.width/arenaW, ppuY=canvas.height/arenaH;
    camX = camSX-(ev.clientX-panSX)/(ppuX*camZoom);
    camY = camSY-(ev.clientY-panSY)/(ppuY*camZoom);
  }
  const rect = canvas.getBoundingClientRect();
  mouseCanvasX = ev.clientX-rect.left;
  mouseCanvasY = ev.clientY-rect.top;
});
window.addEventListener('mouseup', ev => {
  if (isPanning && (ev.button===1||ev.button===2)) { isPanning=false; canvas.style.cursor='crosshair'; }
});
canvas.addEventListener('contextmenu', ev => ev.preventDefault());

window.addEventListener('keydown', ev => {
  if (ev.key==='Escape') {
    if (followId!==null) stopFollowing();
    else if (camZoom>1.05) { camZoom=1; camX=arenaW/2; camY=arenaH/2; }
  } else if (ev.key==='='||ev.key==='+') camZoom=Math.min(ZOOM_MAX,camZoom*1.25);
  else if (ev.key==='-') { camZoom=Math.max(ZOOM_MIN,camZoom/1.25); if(camZoom<=ZOOM_MIN+0.01){camX=arenaW/2;camY=arenaH/2;} }
  else if (ev.key>='1'&&ev.key<='9') {
    const alive=state.entities.filter(e=>!e.is_dead).sort((a,b)=>a.team-b.team||a.id-b.id);
    const i=parseInt(ev.key)-1; if(i<alive.length) followEntity(alive[i].id);
  } else if (ev.key==='0') { camZoom=1; camX=arenaW/2; camY=arenaH/2; stopFollowing(); }
});

// ── Init ──
fetch('/api/config').then(r=>r.json()).then(cfg => {
  matchTitle.textContent = cfg.title?.toUpperCase()||'UNKNOWN';
  arenaW = cfg.arena.width; arenaH = cfg.arena.height;
  camX=arenaW/2; camY=arenaH/2;
  obstacles = cfg.obstacles||[];
  $('hud-scenario').textContent = cfg.scenario||cfg.title||'—';
  $('hud-arena').textContent = `${arenaW}x${arenaH}`;
  initAmbient();
  resize();
}).catch(()=>{ matchTitle.textContent='NO SERVER'; initAmbient(); });

window.addEventListener('resize', resize);
resize();
connect();
requestAnimationFrame(draw);
</script>
